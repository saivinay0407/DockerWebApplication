version: "3.9"
services:
  application:
    image: venkatasaivinay/application:v1
    ports:
      - "1111:80"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.4"
          memory: "256M"
    networks:
      - application_network
    depends_on:
      - devopsdb
      
  devopsdb:
    image: venkatasaivinay/db:v1
    ports:
      - "3306:3306"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.4"
          memory: "256M"
    networks:
      - application_network

networks:
  application_network:
    driver: overlay
